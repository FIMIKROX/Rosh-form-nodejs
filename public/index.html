<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Filling - Rosh Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Registration Form</h2>
        <p class="subtitle">Data seedha MongoDB mein jayega 🚀</p>
        
        <form id="myForm">
            <div class="form-group">
                <label>Pura Naam *</label>
                <input type="text" id="name" placeholder="Tera naam yaha likh">
                <div class="error" id="nameError">Naam to daal bhai</div>
            </div>
            
            <div class="form-group">
                <label>Email *</label>
                <input type="email" id="email" placeholder="example@gmail.com">
                <div class="error" id="emailError">Sahi email daal</div>
            </div>
            
            <div class="form-group">
                <label>Mobile Number *</label>
                <input type="tel" id="phone" placeholder="10 digit ka number">
                <div class="error" id="phoneError">10 digit ka number chahiye</div>
            </div>
            
            <div class="form-group">
                <label>Course Select Kar *</label>
                <select id="course">
                    <option value="">-- Course Chuno --</option>
                    <option value="Web Development">Web Development</option>
                    <option value="App Development">App Development</option>
                    <option value="DSA + Placement">DSA + Placement</option>
                    <option value="AI / ML">AI / ML</option>
                </select>
                <div class="error" id="courseError">Ek course to select kar</div>
            </div>
            
            <div class="form-group">
                <label>Message</label>
                <textarea id="message" rows="3" placeholder="Kuch bolna hai to bol de"></textarea>
            </div>
            
            <button type="submit">Form Submit Kar →</button>
        </form>
        
        <div class="success-msg" id="successMsg"></div>
    </div>

    <script src="script.js"></script>
</body>
  </html>
